<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>90-Day Challenge Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:     #0f1117;
      --paper:   #f7f4ef;
      --muted:   #a09a92;
      --rule:    #e2ddd7;
      --accent:  #1a6b4a;
      --accent2: #d4a847;
      --radius:  6px;
    }

    body { font-family: 'Inter', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; font-size: 15px; line-height: 1.6; }

    /* ── DASHBOARD LIST ── */
    #dashboardView { max-width: 700px; margin: 0 auto; padding: 48px 24px 80px; }

    .page-title { font-family: 'DM Serif Display', serif; font-size: 2.2rem; letter-spacing: -0.5px; margin-bottom: 6px; }
    .page-title em { font-style: italic; color: var(--accent); }
    .page-subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 36px; }

    .challenge-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }

    .challenge-card {
      background: white;
      border: 1.5px solid var(--rule);
      border-radius: 10px;
      padding: 18px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: border-color 0.15s, transform 0.1s;
    }
    .challenge-card:hover { border-color: var(--accent); transform: translateY(-1px); }

    .card-emoji { font-size: 1.8rem; flex-shrink: 0; }

    .card-body { flex: 1; min-width: 0; }
    .card-name { font-family: 'DM Serif Display', serif; font-size: 1.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-meta { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

    .card-progress-wrap { width: 80px; flex-shrink: 0; }
    .card-pct { font-family: 'JetBrains Mono', monospace; font-size: 1rem; color: var(--accent); text-align: right; }
    .card-bar { height: 4px; background: var(--rule); border-radius: 99px; margin-top: 4px; overflow: hidden; }
    .card-bar-fill { height: 100%; background: var(--accent); border-radius: 99px; }

    .card-delete {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 1rem; padding: 4px 6px; border-radius: 4px; flex-shrink: 0;
      transition: color 0.15s, background 0.15s;
    }
    .card-delete:hover { color: #c0392b; background: #fdf0ee; }

    .empty-state {
      text-align: center; padding: 48px 24px;
      border: 2px dashed var(--rule); border-radius: 10px; color: var(--muted);
    }
    .empty-state .big { font-size: 2.5rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.88rem; }

    /* ── NEW CHALLENGE FORM ── */
    .new-btn {
      display: flex; align-items: center; gap: 8px;
      background: var(--accent); color: white;
      border: none; border-radius: var(--radius);
      padding: 11px 20px; font-family: 'Inter', sans-serif;
      font-size: 0.88rem; font-weight: 500; cursor: pointer;
      transition: opacity 0.15s;
    }
    .new-btn:hover { opacity: 0.85; }

    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(15,17,23,0.45); z-index: 100;
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--paper); border-radius: 12px;
      padding: 32px; width: 100%; max-width: 460px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .modal-title { font-family: 'DM Serif Display', serif; font-size: 1.4rem; margin-bottom: 24px; }

    .form-row { margin-bottom: 18px; }
    .form-label { display: block; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; font-weight: 500; margin-bottom: 7px; }

    .form-input, .form-select {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid var(--rule); border-radius: var(--radius);
      font-family: 'Inter', sans-serif; font-size: 0.88rem;
      background: white; color: var(--ink); outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus, .form-select:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--muted); }

    .emoji-picker { display: flex; flex-wrap: wrap; gap: 8px; }
    .emoji-opt {
      font-size: 1.4rem; width: 40px; height: 40px;
      border-radius: 8px; border: 2px solid var(--rule);
      background: white; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: border-color 0.15s, background 0.15s;
    }
    .emoji-opt.selected { border-color: var(--accent); background: rgba(26,107,74,0.08); }

    .modal-actions { display: flex; gap: 10px; margin-top: 28px; justify-content: flex-end; }

    .btn { padding: 9px 18px; border-radius: var(--radius); border: none; font-family: 'Inter', sans-serif; font-size: 0.82rem; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1.5px solid var(--rule); }

    /* ── TRACKER VIEW ── */
    #trackerView { display: none; }

    header {
      border-bottom: 1px solid var(--rule);
      padding: 20px 32px;
      display: flex; align-items: center; gap: 16px;
    }
    .back-btn {
      background: none; border: 1.5px solid var(--rule); border-radius: var(--radius);
      padding: 6px 12px; font-size: 0.8rem; color: var(--muted);
      cursor: pointer; font-family: 'Inter', sans-serif;
      transition: border-color 0.15s, color 0.15s;
    }
    .back-btn:hover { border-color: var(--ink); color: var(--ink); }

    .header-emoji { font-size: 1.6rem; }
    .header-title { font-family: 'DM Serif Display', serif; font-size: 1.6rem; letter-spacing: -0.3px; }
    .header-date { font-size: 0.75rem; color: var(--muted); margin-top: 1px; }

    .stats {
      display: flex; border-bottom: 1px solid var(--rule); background: white;
    }
    .stat { flex: 1; padding: 16px 20px; border-right: 1px solid var(--rule); min-width: 0; }
    .stat:last-child { border-right: none; }
    .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 2rem; font-weight: 500; color: var(--accent); line-height: 1; }
    .stat-value.amber { color: var(--accent2); }
    .stat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.09em; margin-top: 4px; font-weight: 500; }

    main { max-width: 880px; margin: 0 auto; padding: 32px 24px 80px; }

    .section-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 16px; }
    .section-title { font-family: 'DM Serif Display', serif; font-size: 1.2rem; }
    .section-hint { font-size: 0.73rem; color: var(--muted); }

    .progress-wrap { margin-bottom: 36px; }
    .progress-meta { display: flex; justify-content: space-between; font-size: 0.73rem; color: var(--muted); margin-bottom: 7px; }
    .progress-track { height: 7px; background: var(--rule); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #2d9e6e); border-radius: 99px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }

    .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; margin-bottom: 44px; }

    .day-cell {
      aspect-ratio: 1; border-radius: var(--radius);
      border: 1.5px solid var(--rule); background: #e8e2da;
      cursor: pointer; position: relative;
      transition: transform 0.1s, border-color 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .day-cell:hover { transform: scale(1.08); border-color: var(--accent); }
    .day-cell.checked { background: var(--accent); border-color: var(--accent); }
    .day-cell.checked::after { content: '✓'; color: white; font-size: 0.7rem; font-weight: 600; }
    .day-cell.today { border: 2px solid var(--accent2); background: #fff8e8; box-shadow: 0 0 0 3px rgba(212,168,71,0.15); }
    .day-cell.today.checked { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 3px rgba(26,107,74,0.2); }
    .day-cell.future { opacity: 0.35; cursor: default; pointer-events: none; }

    .day-num { position: absolute; top: 3px; left: 5px; font-family: 'JetBrains Mono', monospace; font-size: 0.52rem; color: var(--muted); line-height: 1; }
    .day-cell.checked .day-num { color: rgba(255,255,255,0.5); }

    .day-cell:not(.future):hover .tooltip { opacity: 1; transform: translateX(-50%) translateY(-4px); }
    .tooltip {
      opacity: 0; pointer-events: none; position: absolute;
      bottom: calc(100% + 7px); left: 50%;
      transform: translateX(-50%) translateY(0);
      background: var(--ink); color: white; font-size: 0.68rem;
      padding: 4px 8px; border-radius: 4px; white-space: nowrap;
      transition: opacity 0.15s, transform 0.15s; z-index: 10;
    }
    .tooltip::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 4px solid transparent; border-top-color: var(--ink); }

    .milestone {
      display: none; background: linear-gradient(135deg, var(--accent), #2d9e6e);
      color: white; padding: 14px 20px; border-radius: var(--radius);
      margin-bottom: 24px; align-items: center; gap: 12px;
    }
    .milestone.visible { display: flex; }
    .milestone-icon { font-size: 1.4rem; }
    .milestone-text strong { display: block; font-size: 0.95rem; font-weight: 600; margin-bottom: 1px; }
    .milestone-text span { font-size: 0.82rem; opacity: 0.9; }

    .journal-controls { display: flex; gap: 10px; margin-bottom: 18px; align-items: center; flex-wrap: wrap; }
    .note-input {
      flex: 1; min-width: 200px; padding: 9px 14px;
      border: 1.5px solid var(--rule); border-radius: var(--radius);
      font-family: 'Inter', sans-serif; font-size: 0.85rem;
      background: white; color: var(--ink); outline: none; transition: border-color 0.15s;
    }
    .note-input:focus { border-color: var(--accent); }
    .note-input::placeholder { color: var(--muted); }

    .log-list { display: flex; flex-direction: column; gap: 9px; }
    .log-entry { display: flex; gap: 12px; align-items: flex-start; padding: 11px 15px; background: white; border-radius: var(--radius); border: 1px solid var(--rule); }
    .log-day-badge { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; font-weight: 500; color: white; background: var(--accent); padding: 2px 7px; border-radius: 3px; white-space: nowrap; margin-top: 2px; }
    .log-text { font-size: 0.84rem; color: var(--ink); flex: 1; }
    .log-date { font-size: 0.7rem; color: var(--muted); white-space: nowrap; }
    .empty-log { text-align: center; padding: 28px; color: var(--muted); font-size: 0.83rem; border: 1.5px dashed var(--rule); border-radius: var(--radius); }

    .bottom-actions { margin-top: 52px; padding-top: 20px; border-top: 1px solid var(--rule); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .bottom-note { font-size: 0.75rem; color: var(--muted); }

    /* confetti */
    .confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; overflow: hidden; }
    .confetti-piece { position: absolute; width: 8px; height: 8px; border-radius: 2px; animation: confetti-fall 1.4s ease-out forwards; }
    @keyframes confetti-fall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }

    @media (max-width: 600px) {
      header { padding: 16px; }
      .stats { flex-wrap: wrap; }
      .stat { flex: 1 1 50%; border-bottom: 1px solid var(--rule); }
      main { padding: 20px 12px 60px; }
      .grid { grid-template-columns: repeat(9, 1fr); gap: 5px; }
    }
    @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
  </style>
</head>
<body>

<!-- ══ DASHBOARD ══════════════════════════════════════════════════════ -->
<div id="dashboardView">
  <h1 class="page-title">90-Day <em>Challenges</em></h1>
  <p class="page-subtitle">Pick a challenge below or create a new one.</p>

  <div class="challenge-list" id="challengeList"></div>

  <button class="new-btn" onclick="openNewModal()">
    <span style="font-size:1.1rem">＋</span> New Challenge
  </button>
</div>

<!-- ══ TRACKER ════════════════════════════════════════════════════════ -->
<div id="trackerView">
  <header>
    <button class="back-btn" onclick="showDashboard()">← All challenges</button>
    <span class="header-emoji" id="hEmoji"></span>
    <div>
      <div class="header-title" id="hTitle"></div>
      <div class="header-date" id="hDate"></div>
    </div>
  </header>

  <div class="stats">
    <div class="stat"><div class="stat-value" id="statStreak">0</div><div class="stat-label">Current Streak</div></div>
    <div class="stat"><div class="stat-value" id="statChecked">0</div><div class="stat-label">Days Done</div></div>
    <div class="stat"><div class="stat-value amber" id="statLeft">90</div><div class="stat-label">Remaining</div></div>
    <div class="stat"><div class="stat-value" id="statPct">0%</div><div class="stat-label">Progress</div></div>
  </div>

  <main>
    <div class="milestone" id="milestoneBanner">
      <span class="milestone-icon" id="milestoneIcon">🏆</span>
      <div class="milestone-text"><strong id="milestoneTitle"></strong><span id="milestoneDesc"></span></div>
    </div>

    <div class="section-header">
      <span class="section-title">90-Day Calendar</span>
      <span class="section-hint">Click a day to mark it ✓</span>
    </div>

    <div class="progress-wrap">
      <div class="progress-meta"><span id="progressLabel">Day 1 of 90</span><span id="progressPct">0%</span></div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>

    <div class="grid" id="dayGrid"></div>

    <div class="section-header" style="margin-top:8px;">
      <span class="section-title">Daily Notes</span>
      <span class="section-hint">How are you feeling?</span>
    </div>
    <div class="journal-controls">
      <input type="text" class="note-input" id="noteInput" placeholder="Log a thought or win for today…" maxlength="200" />
      <button class="btn btn-primary" onclick="addNote()">Save</button>
    </div>
    <div class="log-list" id="logList"></div>

    <div class="bottom-actions">
      <span class="bottom-note">Data stored locally in your browser.</span>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-ghost" onclick="exportData()">Export JSON</button>
      </div>
    </div>
  </main>
</div>

<!-- ══ NEW CHALLENGE MODAL ════════════════════════════════════════════ -->
<div class="modal-overlay" id="newModal">
  <div class="modal">
    <div class="modal-title">New 90-Day Challenge</div>

    <div class="form-row">
      <label class="form-label">Challenge name</label>
      <input class="form-input" id="newName" placeholder="e.g. No alcohol, Daily meditation, 10k steps…" maxlength="60" />
    </div>

    <div class="form-row">
      <label class="form-label">Pick an emoji</label>
      <div class="emoji-picker" id="emojiPicker"></div>
    </div>

    <div class="form-row">
      <label class="form-label">Start date</label>
      <input class="form-input" type="date" id="newStart" />
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeNewModal()">Cancel</button>
      <button class="btn btn-primary" onclick="createChallenge()">Start challenge</button>
    </div>
  </div>
</div>

<div class="confetti-container" id="confettiContainer"></div>

<script>
// ── CONSTANTS ──────────────────────────────────────────────────────────
const TOTAL = 90;
const STORE  = 'habit90_v2';
const EMOJIS = ['🚫','🏃','🧘','💪','📚','✍️','🥗','💧','😴','🎯','🧠','🌿','🎸','🖥️','❤️','🏋️','🚴','🌅','🍎','🛑'];
const MILESTONES = [
  { day:1,  icon:'🌱', title:'Day 1 done!',           desc:'Every journey starts with a single step.' },
  { day:3,  icon:'✨', title:'3-day streak!',          desc:'Momentum is building.' },
  { day:7,  icon:'🗓️', title:'One full week!',         desc:'Your body and mind are already adapting.' },
  { day:14, icon:'💪', title:'Two weeks strong',       desc:'Mental clarity is sharpening.' },
  { day:21, icon:'🔥', title:'21 days — habit forming',desc:'Research says 21 days to form a habit.' },
  { day:30, icon:'🏅', title:'30-day milestone',       desc:'One month down. That\'s huge.' },
  { day:60, icon:'🌟', title:'60 days!',               desc:'Two-thirds of the way there.' },
  { day:90, icon:'🏆', title:'CHALLENGE COMPLETE!',    desc:'90 days. You did it!' },
];

// ── STORAGE ────────────────────────────────────────────────────────────
function load() {
  try { const r = localStorage.getItem(STORE); if (r) return JSON.parse(r); } catch {}
  return { challenges: [] };
}
function save(db) { localStorage.setItem(STORE, JSON.stringify(db)); }

let db = load();
let activeId = null;  // currently open challenge id

function getChallenge(id) { return db.challenges.find(c => c.id === id); }

// ── UTILS ──────────────────────────────────────────────────────────────
function todayStr() { return new Date().toISOString().slice(0,10); }

function dateOfDay(startDate, n) {
  const d = new Date(startDate);
  d.setDate(d.getDate() + n - 1);
  return d.toISOString().slice(0,10);
}

function currentDayIndex(startDate) {
  const start  = new Date(startDate);
  const today  = new Date(todayStr());
  return Math.round((today - start) / 86400000) + 1;
}

function formatShort(str) {
  return new Date(str + 'T00:00:00').toLocaleDateString('en-IN', { day:'numeric', month:'short' });
}

function calcStreak(challenge) {
  const today = currentDayIndex(challenge.startDate);
  let s = 0;
  for (let i = Math.min(today, TOTAL); i >= 1; i--) {
    if (challenge.checked[i]) s++; else break;
  }
  return s;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── DASHBOARD ──────────────────────────────────────────────────────────
function showDashboard() {
  document.getElementById('dashboardView').style.display = '';
  document.getElementById('trackerView').style.display   = 'none';
  activeId = null;
  renderDashboard();
}

function renderDashboard() {
  const list = document.getElementById('challengeList');

  if (db.challenges.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="big">🎯</div>
        <p>No challenges yet.<br>Create your first 90-day challenge below.</p>
      </div>`;
    return;
  }

  list.innerHTML = db.challenges.map(c => {
    const checked = Object.values(c.checked||{}).filter(Boolean).length;
    const pct     = Math.round((checked / TOTAL) * 100);
    const streak  = calcStreak(c);
    const todayIdx = currentDayIndex(c.startDate);
    const status  = todayIdx > TOTAL ? 'Completed' : `Day ${Math.min(Math.max(todayIdx,1),TOTAL)} of ${TOTAL}`;
    return `
      <div class="challenge-card" onclick="openChallenge('${c.id}')">
        <span class="card-emoji">${c.emoji}</span>
        <div class="card-body">
          <div class="card-name">${escHtml(c.name)}</div>
          <div class="card-meta">${status} · ${streak} day streak · Started ${formatShort(c.startDate)}</div>
        </div>
        <div class="card-progress-wrap">
          <div class="card-pct">${pct}%</div>
          <div class="card-bar"><div class="card-bar-fill" style="width:${pct}%"></div></div>
        </div>
        <button class="card-delete" onclick="deleteChallenge(event,'${c.id}')" title="Delete">✕</button>
      </div>`;
  }).join('');
}

function deleteChallenge(e, id) {
  e.stopPropagation();
  const c = getChallenge(id);
  if (!confirm(`Delete "${c.name}"? This cannot be undone.`)) return;
  db.challenges = db.challenges.filter(x => x.id !== id);
  save(db);
  renderDashboard();
}

// ── NEW CHALLENGE MODAL ────────────────────────────────────────────────
let selectedEmoji = EMOJIS[0];

function openNewModal() {
  selectedEmoji = EMOJIS[0];
  document.getElementById('newName').value  = '';
  document.getElementById('newStart').value = todayStr();

  // Build emoji picker
  const picker = document.getElementById('emojiPicker');
  picker.innerHTML = EMOJIS.map(e =>
    `<button class="emoji-opt${e===selectedEmoji?' selected':''}" onclick="selectEmoji('${e}',this)">${e}</button>`
  ).join('');

  document.getElementById('newModal').classList.add('open');
  setTimeout(() => document.getElementById('newName').focus(), 50);
}

function selectEmoji(e, btn) {
  selectedEmoji = e;
  document.querySelectorAll('.emoji-opt').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function closeNewModal() {
  document.getElementById('newModal').classList.remove('open');
}

function createChallenge() {
  const name  = document.getElementById('newName').value.trim();
  const start = document.getElementById('newStart').value;
  if (!name) { document.getElementById('newName').focus(); return; }
  if (!start) { document.getElementById('newStart').focus(); return; }

  const challenge = {
    id:        Date.now().toString(36),
    name,
    emoji:     selectedEmoji,
    startDate: start,
    checked:   {},
    notes:     [],
  };

  db.challenges.push(challenge);
  save(db);
  closeNewModal();
  openChallenge(challenge.id);
}

// ── TRACKER ────────────────────────────────────────────────────────────
function openChallenge(id) {
  activeId = id;
  document.getElementById('dashboardView').style.display = 'none';
  document.getElementById('trackerView').style.display   = '';
  renderTracker();
  document.getElementById('noteInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addNote();
  });
}

function renderTracker() {
  const c = getChallenge(activeId);
  if (!c) return;

  const todayIdx  = currentDayIndex(c.startDate);
  const checked   = Object.values(c.checked||{}).filter(Boolean).length;
  const remaining = Math.max(0, TOTAL - checked);
  const pct       = Math.round((checked / TOTAL) * 100);
  const streak    = calcStreak(c);

  // Header
  document.getElementById('hEmoji').textContent  = c.emoji;
  document.getElementById('hTitle').textContent  = c.name;
  document.getElementById('hDate').textContent   = `Started ${formatShort(c.startDate)}`;

  // Stats
  document.getElementById('statStreak').textContent  = streak;
  document.getElementById('statChecked').textContent = checked;
  document.getElementById('statLeft').textContent    = remaining;
  document.getElementById('statPct').textContent     = pct + '%';

  // Progress bar
  const clampedDay = Math.min(Math.max(todayIdx, 1), TOTAL);
  document.getElementById('progressLabel').textContent  = `Day ${clampedDay} of ${TOTAL}`;
  document.getElementById('progressPct').textContent    = pct + '%';
  document.getElementById('progressFill').style.width   = pct + '%';

  // Grid
  renderGrid(c, todayIdx);

  // Milestone
  renderMilestone(c, todayIdx);

  // Log
  renderLog(c);
}

function renderGrid(c, todayIdx) {
  const grid = document.getElementById('dayGrid');
  grid.innerHTML = '';

  for (let i = 1; i <= TOTAL; i++) {
    const dateStr   = dateOfDay(c.startDate, i);
    const isChecked = !!c.checked[i];
    const isToday   = i === todayIdx;
    const isFuture  = i > todayIdx;

    const cell = document.createElement('div');
    cell.className = 'day-cell'
      + (isChecked ? ' checked' : '')
      + (isToday   ? ' today'   : '')
      + (isFuture  ? ' future'  : '');

    cell.innerHTML = `
      <span class="day-num">${i}</span>
      <span class="tooltip">${formatShort(dateStr)}${isChecked?' · ✓':isToday?' · Today':''}</span>`;

    if (!isFuture) cell.addEventListener('click', () => toggleDay(i));
    grid.appendChild(cell);
  }
}

function renderMilestone(c, todayIdx) {
  let latest = null;
  for (const m of MILESTONES) {
    if (m.day <= todayIdx && c.checked[m.day]) latest = m;
  }
  const banner = document.getElementById('milestoneBanner');
  if (latest) {
    document.getElementById('milestoneIcon').textContent  = latest.icon;
    document.getElementById('milestoneTitle').textContent = latest.title;
    document.getElementById('milestoneDesc').textContent  = latest.desc;
    banner.classList.add('visible');
  } else {
    banner.classList.remove('visible');
  }
}

function renderLog(c) {
  const list = document.getElementById('logList');
  if (!c.notes || c.notes.length === 0) {
    list.innerHTML = '<div class="empty-log">No notes yet — start logging your wins.</div>';
    return;
  }
  const sorted = [...c.notes].sort((a,b) => b.day - a.day);
  list.innerHTML = sorted.map(n => `
    <div class="log-entry">
      <span class="log-day-badge">Day ${n.day}</span>
      <span class="log-text">${escHtml(n.text)}</span>
      <span class="log-date">${formatShort(n.date)}</span>
    </div>`).join('');
}

function toggleDay(n) {
  const c = getChallenge(activeId);
  const wasChecked = !!c.checked[n];
  c.checked[n] = !wasChecked;
  save(db);
  renderTracker();
  if (!wasChecked) {
    const isMilestone = MILESTONES.some(m => m.day === n);
    isMilestone ? bigBurst() : burst();
  }
}

function addNote() {
  const c     = getChallenge(activeId);
  const input = document.getElementById('noteInput');
  const text  = input.value.trim();
  if (!text) return;
  const todayIdx = Math.max(1, Math.min(currentDayIndex(c.startDate), TOTAL));
  if (!c.notes) c.notes = [];
  c.notes.push({ day: todayIdx, date: todayStr(), text });
  save(db);
  input.value = '';
  renderLog(c);
}

function exportData() {
  const c    = getChallenge(activeId);
  const blob = new Blob([JSON.stringify(c, null, 2)], { type: 'application/json' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = `${c.name.replace(/\s+/g,'-')}_${todayStr()}.json`;
  a.click();
}

// ── CONFETTI ────────────────────────────────────────────────────────────
const COLORS = ['#1a6b4a','#d4a847','#2d9e6e','#f7f4ef','#0f1117'];
function spawnConfetti(n) {
  const container = document.getElementById('confettiContainer');
  for (let i = 0; i < n; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `left:${Math.random()*100}%;top:-10px;background:${COLORS[Math.floor(Math.random()*COLORS.length)]};animation-delay:${Math.random()*0.5}s;animation-duration:${1+Math.random()*0.8}s;transform:rotate(${Math.random()*360}deg)`;
    container.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}
function burst()    { spawnConfetti(18); }
function bigBurst() { spawnConfetti(60); }

// ── MIGRATE old v1 data ────────────────────────────────────────────────
(function migrateV1() {
  const old = localStorage.getItem('habit90_v1');
  if (!old) return;
  try {
    const d = JSON.parse(old);
    if (d.startDate && !db.challenges.find(c => c.name === 'Alcohol Free')) {
      db.challenges.unshift({
        id: 'migrated',
        name: 'Alcohol Free',
        emoji: '🚫',
        startDate: d.startDate,
        checked: d.checked || {},
        notes: d.notes || [],
      });
      save(db);
    }
  } catch {}
})();

// ── INIT ────────────────────────────────────────────────────────────────
showDashboard();
</script>
